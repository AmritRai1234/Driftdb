version: "3.8"

services:
  driftdb:
    build: .
    container_name: driftdb
    ports:
      - "${DRIFT_REST_PORT:-9211}:9211"   # REST API + Dashboard
      - "${DRIFT_WS_PORT:-9210}:9210"     # WebSocket
    volumes:
      - drift_data:/data
      - drift_backups:/backups
    environment:
      - DRIFT_TOKEN=${DRIFT_TOKEN:-change-me-in-production}
    command: >
      --serve --rest
      --bind 0.0.0.0
      --data-dir /data
      --ws-token ${DRIFT_TOKEN:-change-me-in-production}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9211/health"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  drift_data:
  drift_backups:
