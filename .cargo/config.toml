# ═══════════════════════════════════════════════════════════════════
# DriftDB — AMD Ryzen (Zen 3) Optimized Build Configuration
# ═══════════════════════════════════════════════════════════════════
#
# Target: AMD Ryzen 5 5500U (Zen 3 / Lucienne)
# Enabled: AVX2, FMA, BMI2, SSE4.2, SHA-NI, POPCNT
#
# These flags tell LLVM to emit AMD-native instructions instead of
# generic x86-64, unlocking:
#   - AVX2: 256-bit SIMD for vector math (2x wider than SSE)
#   - FMA:  Fused multiply-add (single cycle mul+add)
#   - BMI2: Bit manipulation (faster hashing, index operations)
#   - SHA-NI: Hardware SHA-256 (10x faster checksums)

[target.x86_64-unknown-linux-gnu]
rustflags = [
    "-C", "target-cpu=znver3",
    "-C", "target-feature=+avx2,+fma,+bmi2,+sse4.2,+sha,+popcnt,+lzcnt",
    "-C", "link-arg=-lm",
]

[profile.release]
opt-level = "s"          # Optimize for size (20% smaller, ~3% speed cost)
lto = "fat"              # Full link-time optimization (cross-crate inlining)
codegen-units = 1         # Single codegen unit = maximum optimization
panic = "abort"           # No unwinding overhead — leaner binary
strip = "symbols"         # Smaller binary
